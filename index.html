<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommandDeck - Pentest & DFIR Offline Repository</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow red-glow"></div>
        <div class="glow blue-glow"></div>
    </div>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Categories</h2>
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="category-search" placeholder="Search categories...">
                </div>
            </div>
            <nav id="category-nav">
                <!-- Nav links generated dynamically by JS -->
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <div class="top-nav" style="text-align: right; margin-bottom: 1rem;">
                    <a href="about.html"
                        style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.3s ease;"><i
                            class="fa-solid fa-bolt"></i> About CommandDeck</a>
                </div>
                <h1><i class="fa-solid fa-layer-group"></i> CommandDeck</h1>
                <p class="subtitle">Drawing massive inspiration from the legendary GTFOBins, CommandDeck provides a
                    blazing-fast, strictly curated local database spanning the most critical methodologies in both
                    Offensive and Defensive security</p>

                <div class="target-input-group">
                    <i class="fa-solid fa-crosshairs"></i>
                    <input type="text" id="target-input" placeholder="Set global TARGET (e.g. 10.0.0.1, example.com)">
                </div>
            </header>

            <div class="team-tabs">
                <button class="tab-btn active" data-team="red"><i class="fa-solid fa-fire"></i> Red Team</button>
                <button class="tab-btn" data-team="blue"><i class="fa-solid fa-shield"></i> Blue Team</button>
            </div>

            <div id="content-area">
                <!-- Content dynamically generated by JS -->
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
